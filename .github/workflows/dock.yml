name: Build Docker Image and Push to GHCR

on:
  push:
    branches: [ main ]          # main branch'e push olunca çalışsın
  workflow_dispatch:            # elle de çalıştırabil (Actions sekmesinden)

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write           # GHCR'ye push için zorunlu

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: GHCR'ye login ol
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}                # senin kullanıcı adın: k4r3
          password: ${{ secrets.GITHUB_TOKEN }}        # otomatik secret, dokunma

      - name: Docker image'ı build et ve push et
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

